    <div id="root"></div>

    <script>
      (function () {
        // Keep this script extremely lightweight: it runs on every DOM mutation.

        function getModalRoot() {
          // The modal overlay is a fixed inset-0 container in this app.
          return (
            document.querySelector('div.fixed.inset-0') ||
            document.querySelector('div.fixed.inset-0.bg-black') ||
            null
          );
        }

        function getApiBaseUrl() {
          try {
            var override = localStorage.getItem('apiBaseUrlOverride');
            if (override) return override.replace(/\/+$/, '');
          } catch (e) {}
          return 'https://people-web-5hqi.onrender.com/api';
        }

        function getAuthToken() {
          try {
            return localStorage.getItem('authToken') || '';
          } catch (e) {
            return '';
          }
        }

        var _cache = {
          approvedAt: 0,
          approved: null,
        };

        function fetchApprovedVerifications() {
          var now = Date.now();
          if (_cache.approved && now - _cache.approvedAt < 30000) {
            return Promise.resolve(_cache.approved);
          }

          var token = getAuthToken();
          if (!token) return Promise.resolve(null);

          var url =
            getApiBaseUrl() + '/admin/freelancer-verifications?status=approved';

          return fetch(url, {
            method: 'GET',
            headers: {
              Authorization: 'Bearer ' + token,
              'Content-Type': 'application/json',
            },
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              var arr = data && (data.verifications || data.data);
              _cache.approved = Array.isArray(arr) ? arr : [];
              _cache.approvedAt = Date.now();
              return _cache.approved;
            })
            .catch(function () {
              return null;
            });
        }

        function extractUserIdFromModalText() {
          // The modal header shows an id like: 69d2af...
          // Grab the first 24-hex token we can find.
          var modal = getModalRoot() || document;
          var text = (modal.textContent || '').trim();
          var m = text.match(/\b[a-f0-9]{24}\b/i);
          return m ? m[0] : '';
        }

        function extractPhoneFromModal() {
          var modal = getModalRoot() || document;
          var text = (modal.textContent || '').trim();
          // Match +91XXXXXXXXXX or similar
          var m = text.match(/\+\d{1,3}\d{8,14}/);
          return m ? m[0] : '';
        }

        function normalizeId(v) {
          if (!v) return '';
          if (typeof v === 'string') return v;
          if (typeof v === 'object') return v._id || v.id || v.userId || '';
          return '';
        }

        function computeAgeFromDob(dob) {
          if (!dob) return '';
          // Accept dd-mm-yyyy (as seen in API) or ISO
          var d = null;
          var m = String(dob).match(/^(\d{2})-(\d{2})-(\d{4})$/);
          if (m) {
            d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
          } else {
            var parsed = new Date(dob);
            if (!Number.isNaN(parsed.getTime())) d = parsed;
          }
          if (!d || Number.isNaN(d.getTime())) return '';

          var now = new Date();
          var age = now.getFullYear() - d.getFullYear();
          var md = now.getMonth() - d.getMonth();
          if (md < 0 || (md === 0 && now.getDate() < d.getDate())) age--;
          return age >= 0 && age < 130 ? String(age) : '';
        }

        function setRowValue(labelWithColon, value) {
          var root = getModalRoot();
          if (!root) return;
          var rows = root.querySelectorAll('div.text-sm.text-gray-700');
          for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var txt = (row.textContent || '').trim();
            if (txt.indexOf(labelWithColon) !== 0) continue;

            var val = value && String(value).trim() ? String(value).trim() : '—';
            row.textContent = labelWithColon + ' ' + val;
            return;
          }
        }

        function renameEmailToAgeLabel() {
          var root = getModalRoot();
          if (!root) return;
          var rows = root.querySelectorAll('div.text-sm.text-gray-700');
          for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var txt = (row.textContent || '').trim();
            if (txt.indexOf('Email:') === 0) {
              row.textContent = 'Age: —';
            }
          }
        }

        function updateModalContent() {
          var root = getModalRoot();
          if (!root) return;

          // Prevent re-running heavy work once filled for this user.
          // Stored on the overlay element to survive re-renders within the modal.
          var lastKey = root.__peopleLastKey || '';

          var headers = root.querySelectorAll(
            'div.text-sm.font-semibold.text-gray-900'
          );

          for (var i = 0; i < headers.length; i++) {
            var el = headers[i];
            var text = (el.textContent || '').trim();

            if (text === 'Personal Details') {
              el.textContent = 'User Details';
            }

            if (text === 'KYC Details' || text === 'KYB Details') {
              var card = el.closest('.border.border-gray-200');
              if (card && card.parentNode) {
                card.parentNode.removeChild(card);
              }
            }
          }

          // Change the label "Email" -> "Age"
          renameEmailToAgeLabel();

          // Populate Gender / Address / Age by fetching verification details.
          var userId = extractUserIdFromModalText();
          var phone = extractPhoneFromModal();
          if (!userId && !phone) return;
          var key = (userId || '') + '|' + (phone || '');
          if (key && lastKey === key && root.__peopleFilled === true) return;
          root.__peopleLastKey = key;

          fetchApprovedVerifications().then(function (list) {
            if (!Array.isArray(list) || !list.length) return;

            var match = null;
            for (var k = 0; k < list.length; k++) {
              var u = list[k] || {};
              var uId = normalizeId(u._id || u.id);
              var uUserId = normalizeId(u.userId);
              var uPhone = (u.phoneNumber || u.phone || '').trim();

              if (
                (userId && (uId === userId || uUserId === userId)) ||
                (phone && uPhone === phone)
              ) {
                match = u;
                break;
              }
            }
            if (!match) return;

            var vd = match.verificationDocuments || {};
            var gender = match.gender || vd.gender;
            var address = match.address || vd.address;
            var dob = match.dateOfBirth || vd.dateOfBirth;
            var age = computeAgeFromDob(dob);

            if (gender) setRowValue('Gender:', gender);
            if (address) setRowValue('Address:', address);
            // Also update DOB if backend has it
            if (dob) setRowValue('DOB:', dob);
            setRowValue('Age:', age || '—');

            // Mark as filled to avoid repeated updates.
            root.__peopleFilled = true;
          });
        }

        // Debounce updates: the MutationObserver can fire very frequently.
        var scheduled = false;
        function scheduleUpdate() {
          if (scheduled) return;
          scheduled = true;
          setTimeout(function () {
            scheduled = false;
            updateModalContent();
          }, 150);
        }

        scheduleUpdate();

        var observer = new MutationObserver(function () {
          scheduleUpdate();
        });

        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
        });
      })();
    </script>

    <script>

        function createAnalyzeOverlay() {

            '<button id="peopleAnalyzeCopy" style="background:#f3f4f6;color:#111827;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer;">Copy JSON</button>' +
            '</div>' +
            '</div>' +
            '<div id="peopleAnalyzeError" style="display:none;margin-top:12px;padding:12px;border-radius:10px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:13px;"></div>' +
            '<div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px;">' +
            '<div style="padding:14px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;">' +
            '<div style="color:#6b7280;font-size:12px;">Total Amount Received</div>' +
            '<div id="m_totalAmountReceived" style="font-size:22px;font-weight:900;margin-top:6px;color:#111827;">—</div>' +
            '</div>' +
            '<div style="padding:14px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;">' +
            '<div style="color:#6b7280;font-size:12px;">Total Revenue</div>' +
            '<div id="m_totalRevenue" style="font-size:22px;font-weight:900;margin-top:6px;color:#111827;">—</div>' +
            '</div>' +
            '<div style="padding:14px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;">' +
            '<div style="color:#6b7280;font-size:12px;">Total Dues Pending</div>' +
            '<div id="m_totalDuesPending" style="font-size:22px;font-weight:900;margin-top:6px;color:#111827;">—</div>' +
            '</div>' +
            '<div style="padding:14px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;">' +
            '<div style="color:#6b7280;font-size:12px;">Online Paid (optional)</div>' +
            '<div id="m_totalAmountReceivedOnline" style="font-size:22px;font-weight:900;margin-top:6px;color:#111827;">—</div>' +
            '</div>' +
            '</div>' +
            '<div style="margin-top:14px;color:#6b7280;font-size:12px;">Endpoint tried: <span id="peopleAnalyzeUrl" style="font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;"></span></div>' +
            '<pre id="peopleAnalyzeRaw" style="margin-top:12px;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.5;background:#0b1020;color:#eef2ff;padding:12px;border-radius:12px;overflow:auto;max-height:340px;"></pre>' +
            '</div>';

          el.appendChild(card);
          document.body.appendChild(el);

          el.querySelector('#peopleAnalyzeClose').onclick = function () {
            el.style.display = 'none';
          };
          el.addEventListener('click', function (e) {
            if (e.target === el) el.style.display = 'none';
          });

          return el;
        }

        function formatMoney(v) {
          if (v === null || v === undefined || v === '') return '—';
          try {
            var n = Number(v);
            if (Number.isNaN(n)) return String(v);
            return '₹' + n.toLocaleString('en-IN');
          } catch (e) {
            return String(v);
          }
        }

        function fetchMetrics() {
          // Call admin-backend proxy (same origin as the admin UI API base) to avoid CORS + keep API key server-side.
          var url = getApiBaseUrl() + '/admin/metrics/summary';
          var token = getAuthToken();

          return fetch(url, {
            method: 'GET',
            headers: {
              Authorization: token ? 'Bearer ' + token : '',
              'Content-Type': 'application/json',
            },
          }).then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) {
                var err = new Error('HTTP ' + r.status);
                err.status = r.status;
                err.url = url;
                err.body = j;
                throw err;
              }
              return { url: url, data: j };
            });
          });
        }

        function createFreelancersReportsOverlay() {
          var existing = document.getElementById('peopleFreelancersReportsOverlay');
          if (existing) return existing;

          var el = document.createElement('div');
          el.id = 'peopleFreelancersReportsOverlay';
          el.style.cssText =
            'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:16px;';

          var card = document.createElement('div');
          card.style.cssText =
            'width:100%;max-width:980px;max-height:90vh;overflow:auto;background:#fff;border-radius:14px;box-shadow:0 20px 40px rgba(0,0,0,.25);';

          card.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #e5e7eb;">' +
            '<div style="font-weight:900;font-size:16px;color:#111827;">Freelancers Reports</div>' +
            '<button id="peopleFreelancersReportsClose" style="border:0;background:transparent;font-size:20px;line-height:1;cursor:pointer;color:#6b7280;">×</button>' +
            '</div>' +
            '<div style="padding:18px;">' +
            '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;">' +
            '<div style="color:#6b7280;font-size:13px;">Red ratings (sorted by total red ratings)</div>' +
            '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
            '<button id="peopleFreelancersReportsRefresh" style="background:#111827;color:#fff;border:0;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer;">Refresh</button>' +
            '<button id="peopleFreelancersReportsCopy" style="background:#f3f4f6;color:#111827;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer;">Copy JSON</button>' +
            '</div>' +
            '</div>' +
            '<div id="peopleFreelancersReportsError" style="display:none;margin-top:12px;padding:12px;border-radius:10px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:13px;"></div>' +
            '<div style="margin-top:14px;color:#6b7280;font-size:12px;">Endpoint tried: <span id="peopleFreelancersReportsUrl" style="font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, Courier New, monospace;"></span></div>' +
            '<div id="peopleFreelancersReportsList" style="margin-top:12px;"></div>' +
            '<pre id="peopleFreelancersReportsRaw" style="margin-top:12px;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.5;background:#0b1020;color:#eef2ff;padding:12px;border-radius:12px;overflow:auto;max-height:320px;"></pre>' +
            '</div>';

          el.appendChild(card);
          document.body.appendChild(el);

          el.querySelector('#peopleFreelancersReportsClose').onclick = function () {
            el.style.display = 'none';
          };
          el.addEventListener('click', function (e) {
            if (e.target === el) el.style.display = 'none';
          });

          return el;
        }

        function fetchRedRatings() {
          var url = getApiBaseUrl() + '/admin/red-ratings';
          var token = getAuthToken();

          return fetch(url, {
            method: 'GET',
            headers: {
              Authorization: token ? 'Bearer ' + token : '',
              'Content-Type': 'application/json',
            },
          }).then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) {
                var err = new Error('HTTP ' + r.status);
                err.status = r.status;
                err.url = url;
                err.body = j;
                throw err;
              }
              return { url: url, data: j };
            });
          });
        }

        function openFreelancersReports() {
          var overlay = createFreelancersReportsOverlay();
          overlay.style.display = 'flex';

          var rawEl = overlay.querySelector('#peopleFreelancersReportsRaw');
          var listEl = overlay.querySelector('#peopleFreelancersReportsList');
          var errEl = overlay.querySelector('#peopleFreelancersReportsError');
          var urlEl = overlay.querySelector('#peopleFreelancersReportsUrl');

          function setError(msg) {
            errEl.style.display = 'block';
            errEl.textContent = msg;
          }

          function clearError() {
            errEl.style.display = 'none';
            errEl.textContent = '';
          }

          function escapeHtml(s) {
            return String(s)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/\"/g, '&quot;')
              .replace(/'/g, '&#039;');
          }

          function renderList(items) {
            if (!Array.isArray(items) || items.length === 0) {
              listEl.innerHTML =
                '<div style="padding:14px;border:1px solid #e5e7eb;border-radius:12px;color:#6b7280;">No red ratings found.</div>';
              return;
            }

            var html = '';
            for (var i = 0; i < items.length; i++) {
              var it = items[i] || {};
              var name = it.fullName || '—';
              var phone = it.phone || '—';
              var total = it.totalRedRatings == null ? 0 : it.totalRedRatings;
              var reasons = Array.isArray(it.reasons) ? it.reasons : [];

              html +=
                '<details style="border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff;">' +
                '<summary style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;list-style:none;">' +
                '<div style="display:flex;flex-direction:column;gap:2px;min-width:0;">' +
                '<div style="font-weight:900;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' +
                escapeHtml(name) +
                '</div>' +
                '<div style="color:#6b7280;font-size:12px;">' +
                escapeHtml(phone) +
                '</div>' +
                '</div>' +
                '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">' +
                '<span style="background:#fee2e2;color:#991b1b;border:1px solid #fecaca;border-radius:999px;padding:6px 10px;font-weight:900;font-size:12px;">Red: ' +
                escapeHtml(total) +
                '</span>' +
                '<span style="color:#6b7280;font-size:12px;">Details</span>' +
                '</div>' +
                '</summary>';

              if (reasons.length) {
                html += '<div style="margin-top:12px;">';
                html +=
                  '<div style="font-weight:900;color:#111827;font-size:13px;margin-bottom:8px;">Reasons</div>';
                for (var r = 0; r < reasons.length; r++) {
                  var rr = reasons[r] || {};
                  html +=
                    '<div style="display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;background:#f9fafb;">' +
                    '<div style="color:#111827;font-size:13px;min-width:0;">' +
                    escapeHtml(rr.reason || '—') +
                    '</div>' +
                    '<div style="font-weight:900;color:#111827;">' +
                    escapeHtml(rr.count == null ? 0 : rr.count) +
                    '</div>' +
                    '</div>';
                }
                html += '</div>';
              } else {
                html +=
                  '<div style="margin-top:12px;color:#6b7280;font-size:13px;">No reasons breakdown available.</div>';
              }

              html += '</details>';
            }

            listEl.innerHTML = html;
          }

          function load() {
            rawEl.textContent = 'Loading…';
            listEl.innerHTML = '';
            clearError();

            fetchRedRatings()
              .then(function (res) {
                urlEl.textContent = res.url;
                rawEl.textContent = JSON.stringify(res.data, null, 2);
                // Backend can return either {success,data:[...]} or directly [...]
                var payload = res.data && res.data.data !== undefined ? res.data.data : res.data;
                renderList(payload);
              })
              .catch(function (e) {
                urlEl.textContent = getApiBaseUrl() + '/admin/red-ratings';
                rawEl.textContent = '';
                setError(
                  'Red ratings endpoint is not reachable yet. Ensure admin backend proxy and People backend are deployed. Last error: ' +
                    (e && e.status ? e.status + ' ' + e.url : String(e))
                );
              });
          }

          overlay.querySelector('#peopleFreelancersReportsRefresh').onclick = load;
          overlay.querySelector('#peopleFreelancersReportsCopy').onclick = function () {
            try {
              navigator.clipboard.writeText(rawEl.textContent || '');
            } catch (e) {}
          };

          load();
        }

        function openAnalyze() {
          var overlay = createAnalyzeOverlay();
          overlay.style.display = 'flex';

          var rawEl = overlay.querySelector('#peopleAnalyzeRaw');
          var errEl = overlay.querySelector('#peopleAnalyzeError');
          var urlEl = overlay.querySelector('#peopleAnalyzeUrl');

          function setError(msg) {
            errEl.style.display = 'block';
            errEl.textContent = msg;
          }

          function clearError() {
            errEl.style.display = 'none';
            errEl.textContent = '';
          }

          function render(data) {
            overlay.querySelector('#m_totalAmountReceived').textContent = formatMoney(
              data.totalAmountReceived
            );
            overlay.querySelector('#m_totalRevenue').textContent = formatMoney(
              data.totalRevenue
            );
            overlay.querySelector('#m_totalDuesPending').textContent = formatMoney(
              data.totalDuesPending
            );
            overlay.querySelector('#m_totalAmountReceivedOnline').textContent =
              data.totalAmountReceivedOnline === undefined
                ? '—'
                : formatMoney(data.totalAmountReceivedOnline);
          }

          function load() {
            rawEl.textContent = 'Loading…';
            clearError();

            fetchMetrics()
              .then(function (res) {
                urlEl.textContent = res.url;
                rawEl.textContent = JSON.stringify(res.data, null, 2);
                render(res.data);
              })
              .catch(function (e) {
                urlEl.textContent =
                  getApiBaseUrl() + '/admin/metrics/summary (not found)';
                rawEl.textContent = '';
                setError(
                  'Metrics endpoint is not reachable yet. Please ensure your backend proxy route is deployed. Last error: ' +
                    (e && e.status ? e.status + ' ' + e.url : String(e))
                );
              });
          }

          overlay.querySelector('#peopleAnalyzeRefresh').onclick = load;
          overlay.querySelector('#peopleAnalyzeCopy').onclick = function () {
            try {
              navigator.clipboard.writeText(rawEl.textContent || '');
            } catch (e) {}
          };

          load();
        }

        // Marker so we can confirm this script is running on the deployed page.
        (function ensureMarker() {
          if (document.getElementById('peopleAnalyzeScriptMarker')) return;
          var m = document.createElement('div');
          m.id = 'peopleAnalyzeScriptMarker';
          m.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;';
          m.textContent = 'analyze-script-active';
          document.body.appendChild(m);
        })();

        function normText(s) {
          return String(s || '')
            .replace(/\s+/g, ' ')
            .trim()
            .toLowerCase();
        }

        function findOpenJobsTab() {
          // Try to find an element in the top tab row whose visible label is "Open Jobs".
          var candidates = document.querySelectorAll('a,button,[role="tab"]');
          for (var i = 0; i < candidates.length; i++) {
            var el = candidates[i];
            if (!el || !el.textContent) continue;
            if (normText(el.textContent) === 'open jobs') return el;
          }
          return null;
        }

        function createTabLike(elToClone, id, label, onClick) {
          var clone = elToClone.cloneNode(true);
          clone.id = id;

          // Remove navigation attributes so it behaves like a button.
          try {
            clone.removeAttribute('href');
          } catch (e) {}
          try {
            clone.removeAttribute('to');
          } catch (e) {}

          clone.setAttribute('type', 'button');
          clone.setAttribute('role', 'tab');
          clone.style.cursor = 'pointer';
          clone.onclick = function (e) {
            try {
              e.preventDefault();
              e.stopPropagation();
            } catch (_) {}
            onClick();
          };

          // Set visible label (best-effort: last text node).
          clone.textContent = label;
          return clone;
        }

        function ensureTabs() {
          var openJobsEl = findOpenJobsTab();
          if (!openJobsEl) return false;
          var parent = openJobsEl.parentElement;
          if (!parent) return false;

          var analyzeId = 'peopleAnalyzeTabBtn';
          var reportsId = 'peopleFreelancersReportsTabBtn';

          var analyzeEl = document.getElementById(analyzeId);
          var reportsEl = document.getElementById(reportsId);

          if (!analyzeEl) {
            analyzeEl = createTabLike(openJobsEl, analyzeId, 'Analyze', openAnalyze);
            if (openJobsEl.nextSibling) parent.insertBefore(analyzeEl, openJobsEl.nextSibling);
            else parent.appendChild(analyzeEl);
          } else if (analyzeEl.parentElement !== parent) {
            if (openJobsEl.nextSibling) parent.insertBefore(analyzeEl, openJobsEl.nextSibling);
            else parent.appendChild(analyzeEl);
          }

          if (!reportsEl) {
            reportsEl = createTabLike(openJobsEl, reportsId, 'Freelancers Reports', openFreelancersReports);
            if (analyzeEl.nextSibling) parent.insertBefore(reportsEl, analyzeEl.nextSibling);
            else parent.appendChild(reportsEl);
          } else if (reportsEl.parentElement !== parent) {
            if (analyzeEl.nextSibling) parent.insertBefore(reportsEl, analyzeEl.nextSibling);
            else parent.appendChild(reportsEl);
          }

          return true;
        }

        // Try once now, then keep it resilient to React re-renders.
        ensureTabs();

        var obs = new MutationObserver(function () {
          ensureTabs();
        });
        obs.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
